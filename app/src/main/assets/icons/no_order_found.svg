<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">

    <!-- Shadow -->
    <ellipse cx="120" cy="215" rx="65" ry="7" stroke="#5C6BC0" stroke-width="2" stroke-dasharray="4 5"
        opacity="0.4" />

    <!-- Document body -->
    <rect x="55" y="55" width="100" height="135" rx="7" stroke="#5C6BC0" stroke-width="3" />

    <!-- Clipboard clip -->
    <rect x="80" y="46" width="50" height="18" rx="5" stroke="#5C6BC0" stroke-width="2.8" />
    <circle cx="105" cy="55" r="4" stroke="#5C6BC0" stroke-width="2.5" />

    <!-- Item rows -->
    <line x1="70" y1="88" x2="135" y2="88" stroke="#5C6BC0" stroke-width="2.5" stroke-linecap="round" />
    <line x1="70" y1="104" x2="128" y2="104" stroke="#5C6BC0" stroke-width="2.5"
        stroke-linecap="round" />
    <line x1="70" y1="120" x2="132" y2="120" stroke="#5C6BC0" stroke-width="2.5"
        stroke-linecap="round" />

    <!-- Divider -->
    <line x1="70" y1="133" x2="143" y2="133" stroke="#5C6BC0" stroke-width="1.5"
        stroke-dasharray="3 3" />

    <!-- Total row -->
    <line x1="70" y1="147" x2="95" y2="147" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round" />
    <line x1="122" y1="147" x2="143" y2="147" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round" />

    <!-- Package icon bottom of doc -->
    <rect x="76" y="160" width="22" height="17" rx="2" stroke="#5C6BC0" stroke-width="2" />
    <line x1="76" y1="167" x2="98" y2="167" stroke="#5C6BC0" stroke-width="1.8" />
    <line x1="85" y1="160" x2="85" y2="167" stroke="#5C6BC0" stroke-width="1.8" />

    <!-- Magnifying glass -->
    <circle cx="155" cy="160" r="24" stroke="#5C6BC0" stroke-width="3.5" />
    <line x1="172" y1="177" x2="190" y2="195" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round" />

    <!-- X inside glass -->
    <line x1="144" y1="149" x2="166" y2="171" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round" />
    <line x1="166" y1="149" x2="144" y2="171" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round" />

</svg>